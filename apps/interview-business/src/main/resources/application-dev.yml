# ============================================================
# 开发环境配置
# 说明：
# 1. 已从 MySQL 迁移至 PostgreSQL（配合 interview-guide 业务集成）
# 2. 敏感信息（密码、密钥）在生产环境必须通过环境变量注入
# ============================================================

spring:
  threads:
    virtual:
      enabled: true  # 启用 Java 21 虚拟线程

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/mhd_interview
    username: ${DB_USERNAME:interview}
    password: ${DB_PASSWORD:interview123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  ai:
    openai:
      base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${AI_API_KEY:sk-placeholder}
      chat:
        options:
          model: ${AI_MODEL:qwen-plus}
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      pgvector:
        dimensions: 1024
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        initialize-schema: true

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false

app:
  ai:
    default-provider: dashscope
  storage:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:interview}
    region: us-east-1
  security:
    aes-key: ${AES_KEY:interview-aes-key-2024}