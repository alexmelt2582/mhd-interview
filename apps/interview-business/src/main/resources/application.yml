# ============================================================
# 应用配置
# 说明：
# 1. 通过 spring.config.import 引入共享基础设施配置
# ============================================================

server:
  # 默认对外端口，生产环境可通过外部配置覆盖。
  port: 8080
  servlet:
    context-path: /
  undertow:
    url-charset: utf-8
    max-http-post-size: -1
    buffer-size: 512
    direct-buffers: true
    threads:
      io: 8
      worker: 256

logging:
  # 统一使用共享 logback 配置，并将日志输出
  config: classpath:logback-spring.xml
  file:
    path: ./logs
  level:
    com.mhd: debug
    org.springframework: warn
    org.mybatis.spring.mapper: error

spring:
  application:
    # 应用名建议与部署单元一一对应，便于配置中心与监控平台区分。
    name: mhd-interview
  profiles:
    # 默认加载 dev，仅用于本地联调；生产环境应由启动参数覆盖。
    active: dev
  config:
    import:
      # 引入共享基础设施配置
      - optional:classpath:application-common.yml
  main:
    banner-mode: console
  mvc:
    static-path-pattern: /static/**
    format:
      date-time: yyyy-MM-dd HH:mm:ss
      date: dd/MM/yyyy
    pathmatch:
      # 使用新路径匹配器，性能更高且规则更明确。
      matching-strategy: path_pattern_parser

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
