services:
  # =========================================
  # 1. Redis 缓存与消息队列服务
  # -----------------------------------------
  redis:
    image: redis:7
    container_name: mhd-push
    restart: always
    ports:
      - "6389:6379"
    volumes:
      - .\docker-data\redis\data:/data
      - .\docker-data\redis\conf:/etc/redis
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
